name: Android APK and AAB Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 1.0.${{ github.run_number }}
      KEYSTORE_FILE: ${{ github.workspace }}/app/release-keystore.jks
      KS_B64: ${{ secrets.KS_B64 }}
      STORE_PASS: ${{ secrets.STORE_PASS }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASS: ${{ secrets.KEY_PASS }}
      HAS_RELEASE_SECRETS: ${{ secrets.KS_B64 != '' && secrets.STORE_PASS != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASS != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Decode release keystore
        if: env.HAS_RELEASE_SECRETS == 'true'
        run: |
          printf '%s' "$KS_B64" | base64 --decode > "$KEYSTORE_FILE"

      - name: Build signed release APK
        if: env.HAS_RELEASE_SECRETS == 'true'
        run: gradle :app:assembleRelease --stacktrace

      - name: Build signed release AAB
        if: env.HAS_RELEASE_SECRETS == 'true'
        run: gradle :app:bundleRelease --stacktrace

      - name: Explain missing release signing secrets
        if: env.HAS_RELEASE_SECRETS != 'true'
        run: |
          echo "Release signing secrets are missing. Debug APK was built only."
          echo "Add GitHub Secrets: KS_B64, STORE_PASS, KEY_ALIAS, KEY_PASS."

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: 3d-live-wallpapers-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload signed release APK
        if: env.HAS_RELEASE_SECRETS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 3d-live-wallpapers-release-signed-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload signed release AAB
        if: env.HAS_RELEASE_SECRETS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 3d-live-wallpapers-release-signed-aab
          path: app/build/outputs/bundle/release/*.aab
